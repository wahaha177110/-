<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>得天独厚音频</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0b0b;
      color: #ffffff;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .player-card {
      width: 100%;
      max-width: 420px;
      background: #151515;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    .cover {
      width: 100%;
      display: block;
    }

    .content {
      padding: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 600;
    }

    p {
      margin: 0 0 24px;
      color: #bfbfbf;
      font-size: 14px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .tip {
      margin-top: 18px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="player-card">
    <!-- 封面图片 -->
    <img class="cover" src="./南门.png" alt="音频封面" />

    <div class="content">
      <h1>这里得天独厚</h1>
      <p>扫码收听音频</p>

      <!-- 音频播放器 -->
      <audio controls preload="metadata">
        <source src="./这里得天独厚.mp3" type="audio/mpeg" />
        你的浏览器不支持音频播放。
      </audio>

      <div class="tip">
        点击播放按钮开始收听
      </div>
    </div>
  </div>
</body>
</html>
